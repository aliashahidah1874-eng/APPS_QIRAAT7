<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>اختبار قراءات</title>
    <!-- Font Awesome CDN untuk Ikon -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* --- RESET & BASIC STYLES --- */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #e5ece9; /* Warna latar belakang aplikasi */
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        /* --- KAD UTAMA (CONTAINER) --- */
        .app-card {
            background-color: #ffffff;
            width: 100%;
            max-width: 380px;
            height: 650px;
            border-radius: 24px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.08);
            position: relative; /* Wajib untuk meletakkan bottom-nav di dalam kad */
            overflow: hidden; /* Elakkan elemen terkeluar dari sudut melengkung */
            display: flex;
            flex-direction: column;
        }

        /* --- BAHAGIAN KANDUNGAN UTAMA --- */
        .card-content {
            padding: 24px 20px 80px 20px; /* Padding bawah 80px supaya tak bertindih dengan nav */
            flex: 1;
            overflow-y: auto;
        }

        /* --- HEADER & SOALAN --- */
        .quiz-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            color: #2b3a4a; /* Warna gelap jelas */
            font-weight: 600;
            font-size: 0.95rem;
        }

        .back-btn {
            color: #2b3a4a;
            text-decoration: none;
            font-size: 1.1rem;
        }

        .question-title {
            color: #1a252c;
            font-size: 1.1rem;
            font-weight: bold;
            text-align: center;
            line-height: 1.6;
            margin-bottom: 25px;
        }

        /* --- BUTANG PILIHAN JAWAPAN --- */
        .options-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .option-btn {
            background-color: #ffffff;
            border: 1.5px solid #d1d9e0;
            border-radius: 14px;
            padding: 14px 16px;
            font-size: 0.95rem;
            color: #2c3e50;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s ease;
            width: 100%;
        }

        .option-btn:hover {
            border-color: #4a6fa5;
            background-color: #f4f7f6;
        }

        .option-btn:active {
            transform: scale(0.98);
        }

        /* --- NAVIGASI BAWAH (BOTTOM NAV BAR) --- */
        .bottom-nav {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 60px;
            background-color: #ffffff;
            border-top: 1px solid #eaeaea;
            display: flex;
            justify-content: space-around;
            align-items: center;
            z-index: 10;
        }

        .nav-item {
            color: #4b32b3; /* Warna ikon navigasi */
            font-size: 1.25rem;
            text-decoration: none;
            display: flex;
            justify-content: center;
            align-items: center;
            width: 25%;
            height: 100%;
            transition: color 0.2s;
        }

        .nav-item:hover, .nav-item.active {
            color: #271480;
        }
    </style>
</head>
<body>

    <div class="app-card">
        
        <!-- Kandungan Quiz -->
        <div class="card-content">
            
            <!-- Header Soalan -->
            <div class="quiz-header">
                <a href="#" class="back-btn"><i class="fa-solid fa-arrow-right"></i></a>
                <span>السؤال ١/٣</span>
                <span>النتيجة: ٠</span>
            </div>

            <!-- Teks Soalan -->
            <h2 class="question-title">
                ما هو المعنى اللغوي لكلمة 'قراءات' في اللغة العربية؟
            </h2>

            <!-- Pilihan Jawapan -->
            <div class="options-container">
                <button class="option-btn">جمع قراءة (تلاوات)</button>
                <button class="option-btn">كتابات</button>
                <button class="option-btn">استماعات</button>
                <button class="option-btn">محفوظات</button>
            </div>

        </div>

        <!-- Bar Navigasi Bawah -->
        <nav class="bottom-nav">
            <a href="#" class="nav-item active"><i class="fa-solid fa-house"></i></a>
            <a href="#" class="nav-item"><i class="fa-solid fa-book-open"></i></a>
            <a href="#" class="nav-item"><i class="fa-solid fa-headphones"></i></a>
            <a href="#" class="nav-item"><i class="fa-solid fa-user"></i></a>
        </nav>

    </div>

</body>
</html>
