<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بطاقة تعليمية - Flashcard Imam & Perawi</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            background: #dbe7e4;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        /* PHONE CONTAINER */
        .phone {
            width: 390px;
            height: 844px;
            background: #fff;
            border-radius: 35px;
            overflow: hidden;
            box-shadow: 0 0 25px rgba(0,0,0,.2);
            position: relative;
            display: flex;
            flex-direction: column;
        }

        /* ================= HEADER STYLE LEARNING ================= */
        .header {
            background: #0f766e;
            color: white;
            padding: 25px 20px;
            text-align: center;
            flex-shrink: 0;
            border-bottom-left-radius: 25px;
            border-bottom-right-radius: 25px;
            direction: rtl;
            position: relative;
        }

        .header-top {
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .back-btn {
            position: absolute;
            right: 0; /* Butang kembali tetap di sebelah kanan untuk RTL */
            color: white;
            font-size: 22px;
            text-decoration: none;
            display: flex;
            align-items: center;
        }

        .header h2 {
            font-size: 24px;
            font-weight: bold;
            letter-spacing: 1px;
            text-align: center;
            width: 100%;
        }

        .subtitle {
            font-size: 14px;
            opacity: 0.9;
            margin-top: 4px;
            text-align: center;
        }

        /* ================= CONTENT ================= */
        .content {
            flex: 1;
            overflow-y: auto;
            padding: 20px 20px 90px 20px;
            direction: rtl;
        }

        .content::-webkit-scrollbar {
            width: 0px;
        }

        /* ================= FLASHCARD ================= */
        .cards {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
        }

        .card {
            height: 170px;
            border-radius: 20px;
            background: linear-gradient(135deg, #15803d, #0f766e);
            display: flex;
            justify-content: center;
            align-items: flex-end;
            padding: 15px;
            text-decoration: none;
            color: white;
            transition: .3s;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 6px 15px rgba(0,0,0,0.15);
        }

        .card h3 {
            width: 100%;
            font-size: 18px;
            text-align: center; /* Teks nama Imam di tengah kad */
            font-weight: bold;
        }

        /* ================= BOTTOM NAV ================= */
        .bottom-nav {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 70px;
            background: #0f766e;
            display: flex;
            justify-content: space-around;
            align-items: center;
            z-index: 100;
            border-top-left-radius: 25px;
            border-top-right-radius: 25px;
            box-shadow: 0 -3px 10px rgba(0,0,0,0.1);
        }

        .bottom-nav a {
            color: rgba(255, 255, 255, 0.5);
            text-decoration: none;
            font-size: 24px;
            transition: .3s;
        }

        .bottom-nav a:hover, .bottom-nav a.active {
            color: white !important;
            transform: scale(1.15);
        }
    </style>
</head>
<body>

<div class="phone">

    <!-- Header Atas (Mengikut Gaya Learning Page) -->
    <div class="header">
        <div class="header-top">
            <h2>بطاقة تعليمية</h2>
            <a href="Learning.html" class="back-btn">
                <i class="fa-solid fa-arrow-right"></i>
            </a>
        </div>
        <p class="subtitle">بطاقات تطبيقية</p>
    </div>

    <!-- Ruang Kad Skrol -->
    <div class="content">
        <div class="cards">
            <a href="Imamperawi.html?id=nafi" class="card">
                <h3>الإمام نافع</h3>
            </a>
            <a href="Imamperawi.html?id=ibnkathir" class="card">
                <h3>الإمام ابن كثير</h3>
            </a>
            <a href="Imamperawi.html?id=abuamr" class="card">
                <h3>الإمام أبو عمرو</h3>
            </a>
            <a href="Imamperawi.html?id=ibnamir" class="card">
                <h3>الإمام ابن عامر</h3>
            </a>
            <a href="Imamperawi.html?id=asim" class="card">
                <h3>الإمام عاصم</h3>
            </a>
            <a href="Imamperawi.html?id=hamzah" class="card">
                <h3>الإمام حمزة</h3>
            </a>
            <a href="Imamperawi.html?id=kisai" class="card">
                <h3>الإمام الكسائي</h3>
            </a>
        </div>
    </div>

    <!-- Navigasi Bawah -->
    <nav class="bottom-nav">
        <a href="index.html">
            <i class="fa-solid fa-house"></i>
        </a>
        <a href="FlashCardImamPerawi.html" class="active">
            <i class="fa-solid fa-book-open"></i>
        </a>
        <a href="Audio.html">
            <i class="fa-solid fa-headphones"></i>
        </a>
        <a href="Setting.html">
            <i class="fa-solid fa-user"></i>
        </a>
    </nav>

</div>

</body>
</html>
